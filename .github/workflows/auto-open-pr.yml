name: Auto Open PR

# main / release-* 以外のブランチに push されたら、まだ PR が無い場合は
# github-actions bot が gh CLI で PR を自動 open する。
#
# ⚠ PAT が必要:
#   GITHUB_TOKEN で作った PR は他の workflow をトリガしない (GitHub の無限ループ防止仕様)。
#   build.yml の `pull_request` トリガを発火させるため、Personal Access Token を
#   `BOT_PAT` secret として登録する必要がある。
#
#   PAT 作成 (Fine-grained 推奨):
#     1. GitHub → Settings → Developer settings → Personal access tokens → Fine-grained
#     2. Repository access: hrmcngs/Backpack-Arsenal のみ
#     3. Permissions:
#        - Contents: Read
#        - Pull requests: Read and write
#        - Workflows: Read and write
#     4. Repo の Settings → Secrets and variables → Actions → New secret
#        Name: BOT_PAT
#        Value: <発行したトークン>

on:
  push:
    branches-ignore:
      - main
      - 'release/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  open-pr:
    runs-on: ubuntu-latest
    # github-actions[bot] が自分の commit を push した場合のループを止める
    if: github.actor != 'github-actions[bot]' && github.actor != 'dependabot[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Open PR if none exists (as bot)
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::BOT_PAT secret is not set. See workflow file for setup instructions."
            exit 1
          fi

          EXISTING=$(gh pr list --head "$BRANCH" --base main --state open --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "::notice::PR already exists for branch $BRANCH: #$EXISTING — skipping."
            exit 0
          fi

          TITLE="$BRANCH"
          # body は PR テンプレートを流用 (チェックボックス全て未チェック状態で開く)
          if [ -f .github/PULL_REQUEST_TEMPLATE.md ]; then
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "$TITLE" \
              --body-file .github/PULL_REQUEST_TEMPLATE.md
          else
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "$TITLE" \
              --body "Auto-opened by github-actions from push by @$ACTOR."
          fi
          echo "::notice::Opened PR from $BRANCH → main as github-actions[bot]"

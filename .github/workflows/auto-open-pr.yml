name: Auto Open Release PR

# `release/*` branch に push されたら、まだ PR が無い場合は
# github-actions[bot] が gh CLI で「リリース承認用 PR」を自動 open する。
#
# 目的: PR = jar を CurseForge にアップロードするかどうかの承認ゲート
# (コードレビュー目的ではない)。普通の開発ブランチ (feature/* など) では
# PR は作らない — 直接 main に push してから release branch を切る運用。
#
# 注意: GITHUB_TOKEN で作られた PR は `pull_request` 系イベントを発火しないため、
# build.yml は `push: branches:[main]` トリガで merge 後に走る設計。

on:
  push:
    branches:
      - 'release/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  open-pr:
    runs-on: ubuntu-latest
    # github-actions[bot] が自分の commit を push した場合のループを止める
    if: github.actor != 'github-actions[bot]' && github.actor != 'dependabot[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Open PR if none exists (as github-actions[bot])
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
        run: |

          EXISTING=$(gh pr list --head "$BRANCH" --base main --state open --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "::notice::Release PR already exists for $BRANCH: #$EXISTING — skipping."
            exit 0
          fi

          # release/v1.0.0-alpha → "Release: v1.0.0-alpha"
          VERSION="${BRANCH#release/}"
          TITLE="Release: $VERSION"
          if [ -f .github/PULL_REQUEST_TEMPLATE.md ]; then
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "$TITLE" \
              --body-file .github/PULL_REQUEST_TEMPLATE.md
          else
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "$TITLE" \
              --body "Auto-opened by github-actions from push by @$ACTOR."
          fi
          echo "::notice::Opened Release PR from $BRANCH → main as github-actions[bot]"

name: Auto Open PR

# main / release-* 以外のブランチに push されたら、まだ PR が無い場合は
# github-actions[bot] が gh CLI で PR を自動 open する。
#
# 注意: GITHUB_TOKEN で作られた PR は `pull_request` 系イベントを発火しないため、
# build.yml は `push: branches:[main]` トリガで merge 後に走る設計に変更している
# (= PR 中の build 検証は手動で `workflow_dispatch` するか、merge 後に確認する)。

on:
  push:
    branches-ignore:
      - main
      - 'release/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  open-pr:
    runs-on: ubuntu-latest
    # github-actions[bot] が自分の commit を push した場合のループを止める
    if: github.actor != 'github-actions[bot]' && github.actor != 'dependabot[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Open PR if none exists (as github-actions[bot])
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
        run: |

          EXISTING=$(gh pr list --head "$BRANCH" --base main --state open --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "::notice::PR already exists for branch $BRANCH: #$EXISTING — skipping."
            exit 0
          fi

          TITLE="$BRANCH"
          # body は PR テンプレートを流用 (チェックボックス全て未チェック状態で開く)
          if [ -f .github/PULL_REQUEST_TEMPLATE.md ]; then
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "$TITLE" \
              --body-file .github/PULL_REQUEST_TEMPLATE.md
          else
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "$TITLE" \
              --body "Auto-opened by github-actions from push by @$ACTOR."
          fi
          echo "::notice::Opened PR from $BRANCH → main as github-actions[bot]"

name: Notify chart updater

# このリポジトリへの push を hrmcngs/hrmc.ngs.computer にディスパッチして
# チャート再生成を即時トリガーする。

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions: {}

concurrency:
  group: notify-charts
  cancel-in-progress: true

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch chart update
        env:
          TOKEN: ${{ secrets.CHARTS_TRIGGER_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "CHARTS_TRIGGER_TOKEN が未設定のためスキップ"
            exit 0
          fi
          # chart 再生成は optional な best-effort 通知なので、 401/403/その他失敗でも
          # 親 commit の build pipeline を赤くしないように HTTP status を読んで warning にする。
          # (-f は付けない。 -o は body 不要なので /dev/null。)
          HTTP=$(curl -sSL -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/hrmcngs/hrmc.ngs.computer/dispatches \
            -d '{"event_type":"user-commit","client_payload":{"repo":"${{ github.repository }}","sha":"${{ github.sha }}"}}')
          if [ "$HTTP" = "204" ] || [ "$HTTP" = "200" ]; then
            echo "::notice::chart update dispatched (HTTP $HTTP)"
          elif [ "$HTTP" = "401" ] || [ "$HTTP" = "403" ]; then
            echo "::warning::chart update auth failed (HTTP $HTTP) — CHARTS_TRIGGER_TOKEN を refresh してください (PAT 期限切れ / scope 不足の可能性)"
          else
            echo "::warning::chart update dispatch returned HTTP $HTTP — skipping"
          fi

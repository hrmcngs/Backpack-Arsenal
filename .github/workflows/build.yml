name: Build & CurseForge

on:
  # main への push (= bot/手動 merge を含む) で起動。
  # bot 経由 PR が GITHUB_TOKEN 名義のため pull_request イベントを発火しないので
  # こちらを正規ルートにする。
  push:
    branches: [main]
  # 手動実行 (release type を明示指定したいとき用)。 test は CF に上げず jar 化のみ。
  workflow_dispatch:
    inputs:
      release_type:
        description: 'CurseForge release type (test = build jar only, no CF upload)'
        required: true
        default: 'alpha'
        type: choice
        options: [alpha, beta, release, test]

permissions:
  contents: read
  pull-requests: read

jobs:
  # ───────────────────────────────────────────────────────────────────
  # PR 本文 / dispatch 入力から release type を決める
  # ───────────────────────────────────────────────────────────────────
  resolve:
    runs-on: ubuntu-latest
    outputs:
      release_type: ${{ steps.parse.outputs.release_type }}
      should_upload: ${{ steps.parse.outputs.should_upload }}
    steps:
      - name: Resolve release type and upload decision
        id: parse
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          RELEASE_TYPE="alpha"
          SHOULD_UPLOAD="false"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RELEASE_TYPE="${{ inputs.release_type }}"
            # test は CF アップロードしない (jar artifact だけ作る)
            if [ "$RELEASE_TYPE" = "test" ]; then
              SHOULD_UPLOAD="false"
              echo "::notice::workflow_dispatch test — build jar only, no CF upload"
            else
              SHOULD_UPLOAD="true"
            fi
          elif [ "${{ github.event_name }}" = "push" ]; then
            # この commit に紐付く PR を API で検索。
            #   - PR が 1 件もない (= 直 push / admin push) → alpha で CF upload 要求
            #   - release/* head の PR → PR body の checkbox で Test/Release/Beta/Alpha 決定
            #   - その他の PR (dependabot 等) → skip
            # CF 上げは environment "curseforge" の Required Reviewers gate でメンテナ承認必須なので、
            # 直 push を毎回 deployment にしても勝手に CF に上がる事は無い。
            PR_JSON=$(gh api "repos/${{ github.repository }}/commits/$COMMIT_SHA/pulls" 2>/dev/null || echo "[]")
            PR_COUNT=$(echo "$PR_JSON" | jq 'length')

            if [ "$PR_COUNT" = "0" ]; then
              # 直 push: commit message 中の [release] / [beta] / [test] tag で type を上書き可能。
              # tag 無し = alpha (これまで通りの安全側 default)。
              COMMIT_MSG=$(gh api "repos/${{ github.repository }}/commits/$COMMIT_SHA" --jq '.commit.message' 2>/dev/null || echo "")
              if echo "$COMMIT_MSG" | grep -qiE '\[release\]'; then
                RELEASE_TYPE="release"
                SHOULD_UPLOAD="true"
                echo "::notice::direct push, commit msg has [release] → CF deployment requested (release)"
              elif echo "$COMMIT_MSG" | grep -qiE '\[beta\]'; then
                RELEASE_TYPE="beta"
                SHOULD_UPLOAD="true"
                echo "::notice::direct push, commit msg has [beta] → CF deployment requested (beta)"
              elif echo "$COMMIT_MSG" | grep -qiE '\[test\]'; then
                RELEASE_TYPE="test"
                SHOULD_UPLOAD="false"
                echo "::notice::direct push, commit msg has [test] → build jar only, no CF upload"
              else
                RELEASE_TYPE="alpha"
                SHOULD_UPLOAD="true"
                echo "::notice::direct push (no tag in commit msg) → CF deployment requested (alpha default)"
              fi
            else
              PR_HEAD=$(echo "$PR_JSON" | jq -r '.[0].head.ref // ""')
              PR_BODY=$(echo "$PR_JSON" | jq -r '.[0].body // ""')

              if [[ "$PR_HEAD" == release/* ]]; then
                # 優先度: Test > Release > Beta > Alpha   (Test が明示されてたら upload しない)
                if echo "$PR_BODY" | grep -qiE '^- \[x\] \*\*Test\*\*'; then
                  RELEASE_TYPE="test"
                  SHOULD_UPLOAD="false"
                  echo "::notice::release PR ($PR_HEAD) flagged as Test — build only, no CF upload"
                else
                  SHOULD_UPLOAD="true"
                  echo "::notice::push from release PR ($PR_HEAD) — will upload"
                  if echo "$PR_BODY" | grep -qiE '^- \[x\] \*\*Release\*\*'; then
                    RELEASE_TYPE="release"
                  elif echo "$PR_BODY" | grep -qiE '^- \[x\] \*\*Beta\*\*'; then
                    RELEASE_TYPE="beta"
                  else
                    RELEASE_TYPE="alpha"
                  fi
                fi
              else
                echo "::notice::push from non-release PR (head='$PR_HEAD', e.g. dependabot) — skip CF upload"
              fi
            fi
          fi

          echo "release_type=$RELEASE_TYPE" >> "$GITHUB_OUTPUT"
          echo "should_upload=$SHOULD_UPLOAD" >> "$GITHUB_OUTPUT"
          echo "::notice::release_type=$RELEASE_TYPE should_upload=$SHOULD_UPLOAD"

  # ───────────────────────────────────────────────────────────────────
  # ビルド本体。PR では check 用、merge 後はアップロード用 jar を生成。
  # ───────────────────────────────────────────────────────────────────
  build:
    needs: resolve
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      jar_name: ${{ steps.findjar.outputs.jar_name }}
      mod_version: ${{ steps.findjar.outputs.mod_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      # Gradle 本体 + Forge MCP cache + project build キャッシュ。
      # forge_gradle/* は MCP 環境構築 (mappings deobf 等) の重い成果物が
      # ぶら下がるので最優先でキャッシュする (初回 4-5 分 → ヒット時 30秒〜1分)。
      #
      # ⚠ ~/.gradle/caches を丸ごとキャッシュすると modules-metadata と
      # forge_gradle の整合が崩れた状態で復元され、compileJava 中の MCP 再生成で
      # "Project services has been closed" 例外を引き起こすことがある。
      # サブディレクトリ単位で固定し、restore-keys (部分一致復元) も廃止する。
      # cache key の "fg6-vN-" は壊れた既存キャッシュを破棄するための世代タグ。
      - name: Cache Gradle + Forge MCP
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches/modules-2
            ~/.gradle/caches/jars-9
            ~/.gradle/caches/transforms-3
            ~/.gradle/caches/forge_gradle
            ~/.gradle/wrapper
            build/createMcpToSrg
            build/createSrgToMcp
            build/extractSrg
            build/downloadMCMeta
            build/downloadMcpConfig
          key: gradle-fg6-v3-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      # 注: MAW jar は build.gradle が CurseMaven 経由 (project 961882, file 8074061)
      # で自動取得するので CI 側で何も用意する必要なし。
      # MAW の新版が出たら build.gradle の maw_curse_file を更新する。

      # CF upload する run のときだけ「CF 最新 + 1」 (= bumpCfVersion) を使う。
      # 普通の push / PR check のときは fetchCfVersion (= 同じ version を使う) のみで
      # キャッシュ更新もせず安全に build できる。
      - name: Bump version (CF upload run)
        if: needs.resolve.outputs.should_upload == 'true'
        run: ./gradlew bumpCfVersion --no-daemon
        continue-on-error: true

      - name: Fetch latest CurseForge version (best-effort)
        if: needs.resolve.outputs.should_upload != 'true'
        run: ./gradlew fetchCfVersion --no-daemon
        continue-on-error: true

      # build = assemble + check。check は test を含むが test が無いので軽い。
      # -x test で test は完全 skip。
      # ⚠ --build-cache は ForgeGradle 6 と相性が悪く、compileJava のタスク出力
      # キャッシュ復元時に MCP の lazy resolution が走り、"Project services has
      # been closed" 例外で落ちることがあるため使わない。
      # ⚠ --parallel / --configureondemand も ForgeGradle 6 と非互換なので付けない
      # (runClient タスクが late registered のため task graph に乗らない)。
      # release_type は resolve job が決定済 (alpha/beta/release)。 build.gradle 側で
      # -Prelease_type を見て jar version の suffix を上書きする (alpha→-alpha、 release→suffix 無し)。
      - name: Build
        run: ./gradlew assemble -x test --no-daemon -Prelease_type=${{ needs.resolve.outputs.release_type }}

      - name: Locate built jar
        id: findjar
        run: |
          JAR=$(ls build/libs/*.jar | grep -v sources | grep -v javadoc | head -1)
          VERSION=$(unzip -p "$JAR" META-INF/mods.toml | grep '^version=' | sed 's/version="\(.*\)"/\1/')
          echo "jar_name=$(basename $JAR)" >> "$GITHUB_OUTPUT"
          echo "mod_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "::notice::jar=$JAR mod_version=$VERSION"

      - name: Upload jar artifact
        uses: actions/upload-artifact@v7
        with:
          name: backpack-arsenal-jar
          path: build/libs/*.jar
          if-no-files-found: error
          retention-days: 30

  # ───────────────────────────────────────────────────────────────────
  # CurseForge アップロード approval — 「checkbox UI」 を実現するため、 build 直後に
  # release type 選択 用の Issue を作成して checkbox に tick → close で承認、 という
  # フローにしている。 実際のアップロードは別 workflow ({@code cf-upload.yml}) で
  # issue close イベントから起動される。
  #
  # セットアップ (リポジトリ管理者):
  #   1. Settings → Environments → New environment "curseforge"
  #   2. Required reviewers にメンテナを追加 (任意の 2 重 gate)
  #   3. Environment secrets に CURSEFORGE_TOKEN を追加
  #   4. Environment secrets に CURSEFORGE_PROJECT_ID を追加
  #   5. Repository variable に CF_GAME_VERSION_IDS を追加
  # ───────────────────────────────────────────────────────────────────
  # Release Type 選択用 Issue を作成 (= checkbox UI)。
  # 実際の CF upload は別 workflow ({@code cf-upload.yml}) で issue close 時に発火。
  # ───────────────────────────────────────────────────────────────────
  create_approval_issue:
    name: 'Create CurseForge approval issue (checkbox UI)'
    needs: [resolve, build]
    if: needs.resolve.outputs.should_upload == 'true'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # gh CLI は git repo context が無いと target repo を解決できない。
      # checkout してないので明示する。
      GH_REPO: ${{ github.repository }}
      DEFAULT_TYPE: ${{ needs.resolve.outputs.release_type }}
      JAR_NAME: ${{ needs.build.outputs.jar_name }}
      MOD_VERSION: ${{ needs.build.outputs.mod_version }}
      COMMIT_SHA: ${{ github.sha }}
      RUN_ID: ${{ github.run_id }}
    steps:
      # actions/github-script は GITHUB_TOKEN を Octokit に直接渡してくれる純正 action。
      # gh CLI や curl で 401 が出る環境でも、 こちらは正しく auth されるケースが多い。
      - name: 'Create approval issue (github-script + Octokit)'
        uses: actions/github-script@v7
        env:
          DEFAULT_TYPE: ${{ needs.resolve.outputs.release_type }}
          JAR_NAME: ${{ needs.build.outputs.jar_name }}
          MOD_VERSION: ${{ needs.build.outputs.mod_version }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
        with:
          script: |
            const { DEFAULT_TYPE, JAR_NAME, MOD_VERSION, COMMIT_SHA, RUN_ID } = process.env;
            const shortSha = COMMIT_SHA.slice(0, 7);
            const repoUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}`;

            // ── 0. 必要なラベル を ensure (既存なら ignore) ──
            const labels = [
              { name: 'cf-approval-pending', color: 'FBCA04', description: 'Awaiting checkbox tick + close for CF upload' },
              { name: 'cf-cancelled',        color: 'B60205', description: 'CF upload cancelled' },
              { name: 'cf-uploaded',         color: '0E8A16', description: 'Uploaded to CurseForge' },
              { name: 'cf-upload-failed',    color: 'B60205', description: 'CurseForge upload failed' },
              { name: 'cf-test-only',        color: 'BFDADC', description: 'Approved as test, no upload' },
            ];
            for (const l of labels) {
              try {
                await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, ...l });
                core.info(`label created: ${l.name}`);
              } catch (e) {
                if (e.status !== 422) throw e; // 422 = already exists
              }
            }

            // ── 1. 既存の pending issue を全部 close (= 最新 push だけ生かす) ──
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              labels: 'cf-approval-pending', state: 'open', per_page: 100,
            });
            for (const iss of existing.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: iss.number,
                body: `Superseded by new push \`${shortSha}\` (run #${RUN_ID})`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: iss.number,
                state: 'closed', state_reason: 'not_planned',
              });
              core.info(`closed superseded issue #${iss.number}`);
            }

            // ── 2. 新規 issue 作成 ──
            // tick 候補から base version (suffix 抜き) を作って 全 type の最終 jar 名を見せる
            const baseVer = MOD_VERSION.replace(/-(alpha|beta|rc|test)(\.\d+)?$/i, '');
            const jarBase = JAR_NAME.replace(/-[\d.]+(-(alpha|beta|rc|test)(\.\d+)?)?\.jar$/i, '');
            const finalJarFor = (t) => {
              const suffix = t === 'release' ? '' : `-${t}`;
              return `${jarBase}-${baseVer}${suffix}.jar`;
            };

            const body = [
              '## CurseForge Upload Approval',
              '',
              '| Field | Value |',
              '|---|---|',
              `| jar (build artifact) | \`${JAR_NAME}\` |`,
              `| version              | \`${baseVer}\` |`,
              `| commit               | \`${shortSha}\` |`,
              `| default type         | **${DEFAULT_TYPE}** |`,
              `| build run            | [#${RUN_ID}](${repoUrl}/actions/runs/${RUN_ID}) |`,
              '',
              '> ⚠ 上の jar は CI の既定値 = `' + DEFAULT_TYPE + '` で作ったもの。',
              '> 実際に CurseForge にアップロードされる jar は **下で tick した type で再ビルド** されるため、',
              '> 下表の通り 名前が変わります。',
              '',
              '### 1. Tick ONE release type:',
              `- [ ] **alpha** — \`${finalJarFor('alpha')}\` (CF alpha)`,
              `- [ ] **beta** — \`${finalJarFor('beta')}\` (CF beta)`,
              `- [ ] **release** — \`${finalJarFor('release')}\` (CF release, suffix 無し)`,
              `- [ ] **test** — build はするが CF にはアップしない (jar artifact のみ)`,
              '',
              `⚠ どれも tick せずに close した場合は **CurseForge にアップロードしません** (= skip)。`,
              `  upload したくなったら issue を再 open → 1 つ tick → close で再 trigger。`,
              '',
              '### 2. Close this issue',
              '→ `cf-upload.yml` workflow が起動 → 必要なら再 build → CF アップロード',
              '',
              '### キャンセル',
              'このまま 何も tick せず close + `cf-cancelled` label を付ければ skip。',
              '',
              '---',
              '<!-- BACKPACK_ARSENAL_METADATA',
              `sha=${COMMIT_SHA}`,
              `run_id=${RUN_ID}`,
              `default_type=${DEFAULT_TYPE}`,
              `jar_name=${JAR_NAME}`,
              `mod_version=${MOD_VERSION}`,
              '-->',
            ].join('\n');

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `CF approval: ${JAR_NAME}`,
              body,
              labels: ['cf-approval-pending'],
            });

            core.notice(`Approval issue created: #${issue.data.number} ${issue.data.html_url}`);
            await core.summary
              .addHeading('Approval issue created')
              .addRaw(`[#${issue.data.number}](${issue.data.html_url})`)
              .addBreak()
              .addRaw('Tick a release type checkbox & close the issue to trigger upload.')
              .write();

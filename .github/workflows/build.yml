name: Build & CurseForge

on:
  # main への push (= bot/手動 merge を含む) で起動。
  # bot 経由 PR が GITHUB_TOKEN 名義のため pull_request イベントを発火しないので
  # こちらを正規ルートにする。
  push:
    branches: [main]
  # 手動実行 (release type を明示指定したいとき用)。 test は CF に上げず jar 化のみ。
  workflow_dispatch:
    inputs:
      release_type:
        description: 'CurseForge release type (test = build jar only, no CF upload)'
        required: true
        default: 'alpha'
        type: choice
        options: [alpha, beta, release, test]

permissions:
  contents: read
  pull-requests: read

jobs:
  # ───────────────────────────────────────────────────────────────────
  # PR 本文 / dispatch 入力から release type を決める
  # ───────────────────────────────────────────────────────────────────
  resolve:
    runs-on: ubuntu-latest
    outputs:
      release_type: ${{ steps.parse.outputs.release_type }}
      should_upload: ${{ steps.parse.outputs.should_upload }}
    steps:
      - name: Resolve release type and upload decision
        id: parse
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          RELEASE_TYPE="alpha"
          SHOULD_UPLOAD="false"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RELEASE_TYPE="${{ inputs.release_type }}"
            # test は CF アップロードしない (jar artifact だけ作る)
            if [ "$RELEASE_TYPE" = "test" ]; then
              SHOULD_UPLOAD="false"
              echo "::notice::workflow_dispatch test — build jar only, no CF upload"
            else
              SHOULD_UPLOAD="true"
            fi
          elif [ "${{ github.event_name }}" = "push" ]; then
            # この commit に紐付く PR を API で検索。
            #   - PR が 1 件もない (= 直 push / admin push) → alpha で CF upload 要求
            #   - release/* head の PR → PR body の checkbox で Test/Release/Beta/Alpha 決定
            #   - その他の PR (dependabot 等) → skip
            # CF 上げは environment "curseforge" の Required Reviewers gate でメンテナ承認必須なので、
            # 直 push を毎回 deployment にしても勝手に CF に上がる事は無い。
            PR_JSON=$(gh api "repos/${{ github.repository }}/commits/$COMMIT_SHA/pulls" 2>/dev/null || echo "[]")
            PR_COUNT=$(echo "$PR_JSON" | jq 'length')

            if [ "$PR_COUNT" = "0" ]; then
              # 直 push: commit message 中の [release] / [beta] / [test] tag で type を上書き可能。
              # tag 無し = alpha (これまで通りの安全側 default)。
              COMMIT_MSG=$(gh api "repos/${{ github.repository }}/commits/$COMMIT_SHA" --jq '.commit.message' 2>/dev/null || echo "")
              if echo "$COMMIT_MSG" | grep -qiE '\[release\]'; then
                RELEASE_TYPE="release"
                SHOULD_UPLOAD="true"
                echo "::notice::direct push, commit msg has [release] → CF deployment requested (release)"
              elif echo "$COMMIT_MSG" | grep -qiE '\[beta\]'; then
                RELEASE_TYPE="beta"
                SHOULD_UPLOAD="true"
                echo "::notice::direct push, commit msg has [beta] → CF deployment requested (beta)"
              elif echo "$COMMIT_MSG" | grep -qiE '\[test\]'; then
                RELEASE_TYPE="test"
                SHOULD_UPLOAD="false"
                echo "::notice::direct push, commit msg has [test] → build jar only, no CF upload"
              else
                RELEASE_TYPE="alpha"
                SHOULD_UPLOAD="true"
                echo "::notice::direct push (no tag in commit msg) → CF deployment requested (alpha default)"
              fi
            else
              PR_HEAD=$(echo "$PR_JSON" | jq -r '.[0].head.ref // ""')
              PR_BODY=$(echo "$PR_JSON" | jq -r '.[0].body // ""')

              if [[ "$PR_HEAD" == release/* ]]; then
                # 優先度: Test > Release > Beta > Alpha   (Test が明示されてたら upload しない)
                if echo "$PR_BODY" | grep -qiE '^- \[x\] \*\*Test\*\*'; then
                  RELEASE_TYPE="test"
                  SHOULD_UPLOAD="false"
                  echo "::notice::release PR ($PR_HEAD) flagged as Test — build only, no CF upload"
                else
                  SHOULD_UPLOAD="true"
                  echo "::notice::push from release PR ($PR_HEAD) — will upload"
                  if echo "$PR_BODY" | grep -qiE '^- \[x\] \*\*Release\*\*'; then
                    RELEASE_TYPE="release"
                  elif echo "$PR_BODY" | grep -qiE '^- \[x\] \*\*Beta\*\*'; then
                    RELEASE_TYPE="beta"
                  else
                    RELEASE_TYPE="alpha"
                  fi
                fi
              else
                echo "::notice::push from non-release PR (head='$PR_HEAD', e.g. dependabot) — skip CF upload"
              fi
            fi
          fi

          echo "release_type=$RELEASE_TYPE" >> "$GITHUB_OUTPUT"
          echo "should_upload=$SHOULD_UPLOAD" >> "$GITHUB_OUTPUT"
          echo "::notice::release_type=$RELEASE_TYPE should_upload=$SHOULD_UPLOAD"

  # ───────────────────────────────────────────────────────────────────
  # ビルド本体。PR では check 用、merge 後はアップロード用 jar を生成。
  # ───────────────────────────────────────────────────────────────────
  build:
    needs: resolve
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      jar_name: ${{ steps.findjar.outputs.jar_name }}
      mod_version: ${{ steps.findjar.outputs.mod_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      # Gradle 本体 + Forge MCP cache + project build キャッシュ。
      # forge_gradle/* は MCP 環境構築 (mappings deobf 等) の重い成果物が
      # ぶら下がるので最優先でキャッシュする (初回 4-5 分 → ヒット時 30秒〜1分)。
      #
      # ⚠ ~/.gradle/caches を丸ごとキャッシュすると modules-metadata と
      # forge_gradle の整合が崩れた状態で復元され、compileJava 中の MCP 再生成で
      # "Project services has been closed" 例外を引き起こすことがある。
      # サブディレクトリ単位で固定し、restore-keys (部分一致復元) も廃止する。
      # cache key の "fg6-vN-" は壊れた既存キャッシュを破棄するための世代タグ。
      - name: Cache Gradle + Forge MCP
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches/modules-2
            ~/.gradle/caches/jars-9
            ~/.gradle/caches/transforms-3
            ~/.gradle/caches/forge_gradle
            ~/.gradle/wrapper
            build/createMcpToSrg
            build/createSrgToMcp
            build/extractSrg
            build/downloadMCMeta
            build/downloadMcpConfig
          key: gradle-fg6-v3-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      # 注: MAW jar は build.gradle が CurseMaven 経由 (project 961882, file 8074061)
      # で自動取得するので CI 側で何も用意する必要なし。
      # MAW の新版が出たら build.gradle の maw_curse_file を更新する。

      # CF upload する run のときだけ「CF 最新 + 1」 (= bumpCfVersion) を使う。
      # 普通の push / PR check のときは fetchCfVersion (= 同じ version を使う) のみで
      # キャッシュ更新もせず安全に build できる。
      - name: Bump version (CF upload run)
        if: needs.resolve.outputs.should_upload == 'true'
        run: ./gradlew bumpCfVersion --no-daemon
        continue-on-error: true

      - name: Fetch latest CurseForge version (best-effort)
        if: needs.resolve.outputs.should_upload != 'true'
        run: ./gradlew fetchCfVersion --no-daemon
        continue-on-error: true

      # build = assemble + check。check は test を含むが test が無いので軽い。
      # -x test で test は完全 skip。
      # ⚠ --build-cache は ForgeGradle 6 と相性が悪く、compileJava のタスク出力
      # キャッシュ復元時に MCP の lazy resolution が走り、"Project services has
      # been closed" 例外で落ちることがあるため使わない。
      # ⚠ --parallel / --configureondemand も ForgeGradle 6 と非互換なので付けない
      # (runClient タスクが late registered のため task graph に乗らない)。
      # release_type は resolve job が決定済 (alpha/beta/release)。 build.gradle 側で
      # -Prelease_type を見て jar version の suffix を上書きする (alpha→-alpha、 release→suffix 無し)。
      - name: Build
        run: ./gradlew assemble -x test --no-daemon -Prelease_type=${{ needs.resolve.outputs.release_type }}

      - name: Locate built jar
        id: findjar
        run: |
          JAR=$(ls build/libs/*.jar | grep -v sources | grep -v javadoc | head -1)
          VERSION=$(unzip -p "$JAR" META-INF/mods.toml | grep '^version=' | sed 's/version="\(.*\)"/\1/')
          echo "jar_name=$(basename $JAR)" >> "$GITHUB_OUTPUT"
          echo "mod_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "::notice::jar=$JAR mod_version=$VERSION"

      - name: Upload jar artifact
        uses: actions/upload-artifact@v7
        with:
          name: backpack-arsenal-jar
          path: build/libs/*.jar
          if-no-files-found: error
          retention-days: 30

  # ───────────────────────────────────────────────────────────────────
  # CurseForge アップロード。
  # `environment: curseforge` の Required Reviewers ルールでゲートされる。
  #
  # セットアップ (リポジトリ管理者):
  #   1. Settings → Environments → New environment "curseforge"
  #   2. Required reviewers にメンテナを追加 (承認ゲート)
  #   3. Environment secrets に CURSEFORGE_TOKEN を追加
  #      (CurseForge → My Account → API Tokens で発行)
  #   4. Environment secrets / variables に CURSEFORGE_PROJECT_ID を追加
  #   5. Repository variable に CF_GAME_VERSION_IDS を追加
  #      (CurseForge 1.20.1 + Forge の数値 ID をカンマ区切りで、例: "9990,7498")
  # ───────────────────────────────────────────────────────────────────
  # ───────────────────────────────────────────────────────────────────
  # 各 step を分割することで GitHub UI に ✅ チェックマーク と所要時間が出る
  # → "1/5 …", "2/5 …" 形式で 進捗 % が視覚的にわかる。
  # $GITHUB_STEP_SUMMARY には Job ページ下部の Summary に進捗バー表示も追加。
  # ───────────────────────────────────────────────────────────────────
  # ジョブ名に承認者向けヘルプを入れて、 承認時の comment 欄で release_type を override 可能に。
  # 承認 comment に "release" / "beta" / "alpha" / "test" のどれかを書くと、
  # その type で jar を再ビルドしてから CurseForge にアップロードする。
  # comment が空 / 未対応キーワード → resolve job で決まった type (alpha が既定) のまま。
  curseforge_upload:
    name: 'CurseForge upload (comment: release|beta|alpha|test to override)'
    needs: [resolve, build]
    if: needs.resolve.outputs.should_upload == 'true'
    runs-on: ubuntu-latest
    environment: curseforge
    env:
      CF_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
      CF_PROJECT_ID: ${{ secrets.CURSEFORGE_PROJECT_ID }}
      CF_GAME_VERSION_IDS: ${{ vars.CF_GAME_VERSION_IDS }}
      RELEASE_TYPE: ${{ needs.resolve.outputs.release_type }}
      MOD_VERSION: ${{ needs.build.outputs.mod_version }}
      # changelog 生成 / deployment query で gh api を使うため
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      COMMIT_SHA: ${{ github.sha }}
    steps:
      - name: '1/5 ▰▱▱▱▱ (20%)  Validate secrets'
        run: |
          # Summary 表の header を初期化 (各 step が自分の行を append していく方式 = sed 不要)
          {
            echo "## CurseForge upload progress"
            echo ""
            echo "| Step | Status |"
            echo "|---|---|"
          } > "$GITHUB_STEP_SUMMARY"
          if [ -z "$CF_TOKEN" ] || [ -z "$CF_PROJECT_ID" ] || [ -z "$CF_GAME_VERSION_IDS" ]; then
            echo "| 1/5 Validate secrets | ❌ missing |" >> "$GITHUB_STEP_SUMMARY"
            echo "::error::Missing required secret/variable: CURSEFORGE_TOKEN / CURSEFORGE_PROJECT_ID / CF_GAME_VERSION_IDS"
            exit 1
          fi
          echo "| 1/5 Validate secrets | ✅ done |" >> "$GITHUB_STEP_SUMMARY"
          echo "::notice::▰▱▱▱▱ 20%  secrets OK ($(echo $CF_TOKEN | wc -c) char token, project $CF_PROJECT_ID)"

      - name: '2/5 ▰▰▱▱▱ (40%)  Download built jar'
        uses: actions/download-artifact@v8
        with:
          name: backpack-arsenal-jar
          path: dist

      - name: '2/5 ▰▰▱▱▱ (40%)  Verify jar artifact'
        run: |
          JAR=$(ls dist/*.jar | grep -v sources | grep -v javadoc | head -1)
          if [ ! -f "$JAR" ]; then
            echo "| 2/5 Download jar | ❌ missing |" >> "$GITHUB_STEP_SUMMARY"
            echo "::error::No jar found in dist/"
            exit 1
          fi
          SIZE=$(du -h "$JAR" | cut -f1)
          echo "JAR_PATH=$JAR" >> "$GITHUB_ENV"
          echo "JAR_SIZE=$SIZE" >> "$GITHUB_ENV"
          echo "| 2/5 Download jar ($SIZE) | ✅ done |" >> "$GITHUB_STEP_SUMMARY"
          echo "::notice::▰▰▱▱▱ 40%  jar=$(basename $JAR) size=$SIZE"

      # ── 承認 comment による release_type 上書き ──────────────────────────
      # GitHub の Environment 承認画面の「comment」 欄に書いた文字列を query して、
      # release / beta / alpha / test のキーワードを検出。 違う type が要求された場合は
      # 再ビルドして jar を差し替える。 これで「checkbox」 相当の UX:
      #   - 何も書かない    → そのまま (resolve job の決定 = 大抵 alpha)
      #   - "release"     → 再ビルドで suffix 無しの release jar
      #   - "beta"        → 再ビルドで -beta jar
      #   - "alpha"       → 既定 alpha なら no-op
      #   - "test"        → upload skip にしたいが既に approved 後なので、 type=test で
      #                      ビルドした jar を CF に上げる (= test 名前 で alpha 同然)
      - name: 'Override release_type from approval comment'
        id: override
        run: |
          # この commit に紐付く curseforge deployment の最新 1 件 を query
          DEP_ID=$(gh api "repos/${{ github.repository }}/deployments?environment=curseforge&sha=$COMMIT_SHA&per_page=1" \
            --jq '.[0].id // empty' 2>/dev/null || echo "")
          if [ -z "$DEP_ID" ]; then
            echo "no deployment found for $COMMIT_SHA — skip override"
            echo "needs_rebuild=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          # deployment status の description 全部に検査かける (最新 success の description が
          # 承認時 comment のはず)
          COMMENTS=$(gh api "repos/${{ github.repository }}/deployments/$DEP_ID/statuses?per_page=20" \
            --jq '.[].description // empty' 2>/dev/null | grep -vE '^$' | tr '\n' ' ')
          echo "approval comments: '$COMMENTS'"
          OVERRIDE=""
          if echo "$COMMENTS" | grep -qiE '(^|[^a-z])release([^a-z]|$)'; then OVERRIDE=release
          elif echo "$COMMENTS" | grep -qiE '(^|[^a-z])beta([^a-z]|$)'; then OVERRIDE=beta
          elif echo "$COMMENTS" | grep -qiE '(^|[^a-z])alpha([^a-z]|$)'; then OVERRIDE=alpha
          elif echo "$COMMENTS" | grep -qiE '(^|[^a-z])test([^a-z]|$)'; then OVERRIDE=test
          fi
          if [ -n "$OVERRIDE" ] && [ "$OVERRIDE" != "$RELEASE_TYPE" ]; then
            echo "::notice::release_type override via approval comment: $RELEASE_TYPE → $OVERRIDE"
            echo "| 2.5 Approval comment override | ✅ $RELEASE_TYPE → $OVERRIDE (rebuild) |" >> "$GITHUB_STEP_SUMMARY"
            echo "release_type=$OVERRIDE" >> $GITHUB_OUTPUT
            echo "needs_rebuild=true" >> $GITHUB_OUTPUT
          else
            echo "::notice::no release_type override (comment='${COMMENTS}', current=$RELEASE_TYPE)"
            echo "| 2.5 Approval comment override | ⇣ none ($RELEASE_TYPE kept) |" >> "$GITHUB_STEP_SUMMARY"
            echo "needs_rebuild=false" >> $GITHUB_OUTPUT
          fi

      # rebuild 用の checkout + jdk + cache (override 時のみ)
      - name: 'Checkout for rebuild'
        if: steps.override.outputs.needs_rebuild == 'true'
        uses: actions/checkout@v6

      - name: 'JDK 17 for rebuild'
        if: steps.override.outputs.needs_rebuild == 'true'
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 'Restore gradle cache for rebuild'
        if: steps.override.outputs.needs_rebuild == 'true'
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches/modules-2
            ~/.gradle/caches/jars-9
            ~/.gradle/caches/transforms-3
            ~/.gradle/caches/forge_gradle
            ~/.gradle/wrapper
            build/createMcpToSrg
            build/createSrgToMcp
            build/extractSrg
            build/downloadMCMeta
            build/downloadMcpConfig
          key: gradle-fg6-v3-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: 'Rebuild jar with overridden release_type'
        if: steps.override.outputs.needs_rebuild == 'true'
        env:
          NEW_TYPE: ${{ steps.override.outputs.release_type }}
        run: |
          echo "::notice::rebuilding with -Prelease_type=$NEW_TYPE ..."
          ./gradlew assemble -x test --no-daemon -Prelease_type="$NEW_TYPE"
          NEW_JAR=$(ls build/libs/*.jar | grep -v sources | grep -v javadoc | head -1)
          if [ ! -f "$NEW_JAR" ]; then
            echo "::error::rebuild failed — no jar produced"
            exit 1
          fi
          # 古い jar 入れ替え
          rm -f dist/*.jar
          cp "$NEW_JAR" dist/
          NEW_SIZE=$(du -h "$NEW_JAR" | cut -f1)
          # env 上書き (以降の step で新 jar / 新 type が使われる)
          echo "JAR_PATH=dist/$(basename $NEW_JAR)" >> $GITHUB_ENV
          echo "JAR_SIZE=$NEW_SIZE" >> $GITHUB_ENV
          echo "RELEASE_TYPE=$NEW_TYPE" >> $GITHUB_ENV
          echo "::notice::rebuilt: $(basename $NEW_JAR) ($NEW_SIZE) type=$NEW_TYPE"

      - name: '3/5 ▰▰▰▱▱ (60%)  Prepare metadata (auto-changelog)'
        run: |
          GAME_VER_JSON=$(echo "[$CF_GAME_VERSION_IDS]")

          # ── changelog 自動生成 ────────────────────────────────────────────
          # 前回成功した curseforge 環境 deployment の SHA を取得し、 そこから HEAD までの
          # commit を 1 行サマリで列挙 (`gh api` のみ、 git checkout 不要)。 前回成功が無い場合
          # は 最新 20 commit を使う。
          LAST_CF_SHA=""
          DEPS_JSON=$(gh api "repos/${{ github.repository }}/deployments?environment=curseforge&per_page=30" 2>/dev/null || echo "[]")
          for DEP_ID in $(echo "$DEPS_JSON" | jq -r '.[].id'); do
            STATE=$(gh api "repos/${{ github.repository }}/deployments/$DEP_ID/statuses?per_page=10" \
              --jq '[.[] | .state] | map(select(. == "success" or . == "failure" or . == "in_progress")) | .[0] // ""' 2>/dev/null || echo "")
            DEP_SHA=$(echo "$DEPS_JSON" | jq -r ".[] | select(.id == $DEP_ID) | .sha")
            # 今回の deployment 自身 (= COMMIT_SHA) は skip
            if [ "$DEP_SHA" = "$COMMIT_SHA" ]; then continue; fi
            if [ "$STATE" = "success" ]; then
              LAST_CF_SHA="$DEP_SHA"
              break
            fi
          done

          if [ -n "$LAST_CF_SHA" ]; then
            echo "[changelog] base = last successful CF deployment $LAST_CF_SHA"
            # compare API は最大 250 commit (それ以上は別 fetch 必要だが通常リリースでは十分)
            COMMITS=$(gh api "repos/${{ github.repository }}/compare/${LAST_CF_SHA}...${COMMIT_SHA}" \
              --jq '.commits | reverse | .[] | "- " + (.commit.message | split("\n")[0]) + " (`" + .sha[0:7] + "`)"' 2>/dev/null || echo "")
            CHANGELOG_HEADER="## Changes since previous CurseForge release (\`${LAST_CF_SHA:0:7}\`)"
          else
            echo "[changelog] no prior successful CF deployment — using last 20 commits"
            COMMITS=$(gh api "repos/${{ github.repository }}/commits?sha=${COMMIT_SHA}&per_page=20" \
              --jq '.[] | "- " + (.commit.message | split("\n")[0]) + " (`" + .sha[0:7] + "`)"' 2>/dev/null || echo "")
            CHANGELOG_HEADER="## Recent commits (last 20)"
          fi

          if [ -z "$COMMITS" ]; then
            CHANGELOG=$(printf "Automated release: %s" "$MOD_VERSION")
          else
            # CHANGELOG = header + 空行 + commit list
            CHANGELOG=$(printf "%s\n\n%s\n" "$CHANGELOG_HEADER" "$COMMITS")
          fi

          # log にも changelog を吐く (デバッグ用)
          echo "── auto-generated changelog ──────────"
          echo "$CHANGELOG"
          echo "────────────────────────────────────"

          # JSON metadata 組み立て (jq が --arg で改行/quote を escape してくれる)
          METADATA=$(jq -nc \
            --arg cl "$CHANGELOG" \
            --arg rt "$RELEASE_TYPE" \
            --argjson gv "$GAME_VER_JSON" \
            '{ changelog: $cl, changelogType: "markdown", releaseType: $rt, gameVersions: $gv }')
          # 改行/quote を保ったまま次 step に渡すため heredoc に書き出す
          {
            echo 'METADATA<<__EOF__'
            echo "$METADATA"
            echo '__EOF__'
          } >> "$GITHUB_ENV"

          # Job summary にも changelog プレビューを出す (5/5 まで保持される)
          {
            echo ""
            echo "### Changelog (sent to CurseForge)"
            echo ""
            echo "$CHANGELOG"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          COMMIT_COUNT=$(echo "$COMMITS" | grep -c '^-' || echo 0)
          echo "| 3/5 Prepare metadata ($COMMIT_COUNT commits in changelog) | ✅ done |" >> "$GITHUB_STEP_SUMMARY"
          echo "::notice::▰▰▰▱▱ 60%  metadata prepared ($COMMIT_COUNT commits, $(echo $METADATA | wc -c) bytes)"

      - name: '4/5 ▰▰▰▰▱ (80%)  Upload to CurseForge (curl --progress-bar)'
        run: |
          echo "::notice::▰▰▰▰▱ 80%  POST $(basename $JAR_PATH) ($JAR_SIZE) as $RELEASE_TYPE ..."
          # --progress-bar で進捗を log に吐く。 終わったら status コードを HTTP_CODE に。
          HTTP=$(curl --progress-bar \
            -o response.json -w "%{http_code}" \
            -H "X-Api-Token: $CF_TOKEN" \
            -F "metadata=$METADATA" \
            -F "file=@$JAR_PATH" \
            "https://minecraft.curseforge.com/api/projects/$CF_PROJECT_ID/upload-file")
          echo "HTTP_CODE=$HTTP" >> "$GITHUB_ENV"
          echo "::notice::upload HTTP $HTTP"
          if [ "$HTTP" != "200" ]; then
            echo "| 4/5 Upload to CurseForge | ❌ HTTP $HTTP |" >> "$GITHUB_STEP_SUMMARY"
            echo "::error::CurseForge upload failed with HTTP $HTTP"
            cat response.json | head -40
            exit 1
          fi
          echo "| 4/5 Upload to CurseForge ($JAR_SIZE) | ✅ HTTP 200 |" >> "$GITHUB_STEP_SUMMARY"

      - name: '5/5 ▰▰▰▰▰ (100%) Verify CurseForge response'
        run: |
          FILE_ID=$(jq -r '.id // empty' response.json 2>/dev/null || true)
          if [ -z "$FILE_ID" ]; then
            echo "| 5/5 Verify response | ⚠ no file id (HTTP 200 but unknown body) |" >> "$GITHUB_STEP_SUMMARY"
            echo "::warning::HTTP 200 but no file id in response — check CurseForge."
            cat response.json
          else
            CF_URL="https://www.curseforge.com/minecraft/mc-mods/arsenal-backpack/files/$FILE_ID"
            echo "| 5/5 Verify response (file #$FILE_ID) | ✅ done |" >> "$GITHUB_STEP_SUMMARY"
            {
              echo ""
              echo "### ✅ Uploaded"
              echo ""
              echo "- File: \`$(basename $JAR_PATH)\` ($JAR_SIZE)"
              echo "- Release type: \`$RELEASE_TYPE\`"
              echo "- CurseForge file: [#$FILE_ID]($CF_URL)"
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::notice::▰▰▰▰▰ 100% Uploaded as file #$FILE_ID → $CF_URL"
          fi

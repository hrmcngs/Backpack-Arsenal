name: CF Upload (issue-triggered)

# Issue close をトリガに、 build.yml が作った approval issue を解析して
# CurseForge にアップロード。 release_type は issue 本文の checkbox から決定:
#   - [x] alpha    → CF alpha
#   - [x] beta     → CF beta
#   - [x] release  → CF release (suffix 無し jar)
#   - [x] test     → CF アップロード skip (jar artifact のみ作る)
#   (none ticked) → CF アップロード skip (= 「手を滑らせた」 安全側 default)。
#                   upload したい時は issue を再 open → 1 つ tick → close で再 trigger。
#
# 認可: cf-approval-pending label が付いてる issue を、 リポ owner / collaborator が
# close したときのみ実行。 cf-cancelled label が付いてたら skip。

on:
  issues:
    types: [closed]

permissions:
  issues: write
  contents: read
  actions: read

jobs:
  upload:
    if: >
      contains(github.event.issue.labels.*.name, 'cf-approval-pending') &&
      !contains(github.event.issue.labels.*.name, 'cf-cancelled') &&
      github.event.sender.login == github.event.repository.owner.login
    runs-on: ubuntu-latest
    # CURSEFORGE_TOKEN / CURSEFORGE_PROJECT_ID は environment "curseforge" の secret に
    # 登録されてるため、 ここで environment 指定が無いと secrets.* が空になる。
    # Required Reviewers gate を残しておくと「Issue close で承認 → さらに environment
    # approval 待ち」 の 2 段になるので、 「checkbox UI」 1 段で済ませたいなら environment
    # の Required reviewers 設定を Settings UI で外してください (secrets 自体はそのまま保持)。
    environment: curseforge
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # checkout より前に gh CLI を使う step があるので明示
      GH_REPO: ${{ github.repository }}
      CF_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
      CF_PROJECT_ID: ${{ secrets.CURSEFORGE_PROJECT_ID }}
      CF_GAME_VERSION_IDS: ${{ vars.CF_GAME_VERSION_IDS }}
      ISSUE_NUMBER: ${{ github.event.issue.number }}
    steps:
      # ── checkbox + metadata footer を解析 ─────────────────────────────
      - name: 'Parse issue body for release_type / sha'
        id: parse
        uses: actions/github-script@v9
        with:
          script: |
            const issueNum = parseInt(process.env.ISSUE_NUMBER, 10);
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: issueNum,
            });
            const body = issue.body || '';

            // metadata footer
            const grab = (k) => {
              const m = body.match(new RegExp(`^${k}=(.+)$`, 'm'));
              return m ? m[1].trim() : '';
            };
            const sha = grab('sha');
            const run_id = grab('run_id');
            const default_type = grab('default_type');
            const mod_version = grab('mod_version');

            // checkbox 解析 (release > beta > alpha > test 順、 先に hit したのを採用)
            let type = '';
            const checks = ['release', 'beta', 'alpha', 'test'];
            for (const t of checks) {
              const re = new RegExp(`^- \\[x\\] \\*\\*${t}\\*\\*`, 'mi');
              if (re.test(body)) { type = t; break; }
            }
            if (!type) {
              core.warning(`no checkbox ticked → upload SKIPPED (要 release type tick で再 open + close)`);
              core.setOutput('skip', 'true');
              core.setOutput('release_type', '');
              core.setOutput('sha', sha);
              core.setOutput('run_id', run_id);
              core.setOutput('mod_version', mod_version);
              return;
            }
            core.notice(`release_type from checkbox: ${type}`);

            core.setOutput('skip', 'false');
            core.setOutput('release_type', type);
            core.setOutput('sha', sha);
            core.setOutput('run_id', run_id);
            core.setOutput('mod_version', mod_version);

            await core.summary
              .addHeading(`CurseForge upload from approval issue #${issueNum}`)
              .addTable([
                [{ data: 'Field', header: true }, { data: 'Value', header: true }],
                ['release_type', `\`${type}\``],
                ['sha',          `\`${sha.slice(0,7)}\``],
                ['mod_version',  `\`${mod_version}\``],
                ['build run',    `[#${run_id}](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${run_id})`],
              ])
              .write();

      # ── 無選択 close: upload skip + Issue に notify ──────────────────
      - name: 'Skip (no checkbox ticked)'
        if: steps.parse.outputs.skip == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const issueNum = parseInt(process.env.ISSUE_NUMBER, 10);
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: issueNum,
              body: '⏸ No release type checkbox was ticked — CurseForge upload skipped.\n\n' +
                    'To trigger upload: reopen this issue, tick exactly one **alpha / beta / release / test** checkbox, then close again.',
            });
            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: issueNum,
              labels: ['cf-cancelled'],
            });
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: issueNum,
                name: 'cf-approval-pending',
              });
            } catch (e) { if (e.status !== 404) throw e; }
            await core.summary.addHeading('⏸ Upload skipped (no checkbox)').write();

      # ── test type: jar build せず skip ────────────────────────────────
      - name: 'Skip (release_type=test)'
        if: steps.parse.outputs.skip != 'true' && steps.parse.outputs.release_type == 'test'
        uses: actions/github-script@v9
        with:
          script: |
            const issueNum = parseInt(process.env.ISSUE_NUMBER, 10);
            const runId = "${{ steps.parse.outputs.run_id }}";
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: issueNum,
              body: `✅ Approved as **test** — no CurseForge upload performed (build artifact already produced in run #${runId}).`,
            });
            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: issueNum,
              labels: ['cf-test-only'],
            });
            await core.summary.addHeading('test mode — no upload').write();

      # ── 通常 type: ビルド → CF アップロード ────────────────────────────
      - name: 'Checkout (at issue sha)'
        if: steps.parse.outputs.skip != 'true' && steps.parse.outputs.release_type != 'test'
        uses: actions/checkout@v7
        with:
          ref: ${{ steps.parse.outputs.sha }}
          fetch-depth: 1

      - name: 'Set up JDK 17'
        if: steps.parse.outputs.skip != 'true' && steps.parse.outputs.release_type != 'test'
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 'Restore gradle cache'
        if: steps.parse.outputs.skip != 'true' && steps.parse.outputs.release_type != 'test'
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches/modules-2
            ~/.gradle/caches/jars-9
            ~/.gradle/caches/transforms-3
            ~/.gradle/caches/forge_gradle
            ~/.gradle/wrapper
            build/createMcpToSrg
            build/createSrgToMcp
            build/extractSrg
            build/downloadMCMeta
            build/downloadMcpConfig
          key: gradle-fg6-v3-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: 'Build jar with selected release_type'
        if: steps.parse.outputs.skip != 'true' && steps.parse.outputs.release_type != 'test'
        env:
          NEW_TYPE: ${{ steps.parse.outputs.release_type }}
        run: |
          ./gradlew assemble -x test --no-daemon -Prelease_type="$NEW_TYPE"
          JAR=$(ls build/libs/*.jar | grep -v sources | grep -v javadoc | head -1)
          if [ ! -f "$JAR" ]; then
            echo "::error::no jar produced"
            exit 1
          fi
          SIZE=$(du -h "$JAR" | cut -f1)
          echo "JAR_PATH=$JAR" >> $GITHUB_ENV
          echo "JAR_SIZE=$SIZE" >> $GITHUB_ENV
          echo "RELEASE_TYPE=$NEW_TYPE" >> $GITHUB_ENV
          echo "::notice::built $(basename $JAR) ($SIZE)"

      - name: 'Validate CF secrets'
        if: steps.parse.outputs.skip != 'true' && steps.parse.outputs.release_type != 'test'
        run: |
          if [ -z "$CF_TOKEN" ] || [ -z "$CF_PROJECT_ID" ] || [ -z "$CF_GAME_VERSION_IDS" ]; then
            echo "::error::CURSEFORGE_TOKEN / CURSEFORGE_PROJECT_ID / CF_GAME_VERSION_IDS の secret/variable が足りません"
            exit 1
          fi

      - name: 'Prepare CurseForge metadata (auto-changelog)'
        if: steps.parse.outputs.skip != 'true' && steps.parse.outputs.release_type != 'test'
        env:
          COMMIT_SHA: ${{ steps.parse.outputs.sha }}
        run: |
          GAME_VER_JSON=$(echo "[$CF_GAME_VERSION_IDS]")

          # 前回成功 CF deployment / issue から SHA を引き、 そこから今回までの commit を列挙。
          # この workflow は environment 使わないので、 「前回成功」 = 前回 close された
          # cf-approval-pending issue の merge commit を採用。 simpler に latest 20 で fallback。
          COMMITS=$(gh api "repos/${{ github.repository }}/commits?sha=${COMMIT_SHA}&per_page=20" \
            --jq '.[] | "- " + (.commit.message | split("\n")[0]) + " (`" + .sha[0:7] + "`)"' 2>/dev/null || echo "")
          if [ -z "$COMMITS" ]; then
            CHANGELOG="Automated release: ${{ steps.parse.outputs.mod_version }}"
          else
            CHANGELOG=$(printf "## Recent changes\n\n%s\n" "$COMMITS")
          fi

          METADATA=$(jq -nc \
            --arg cl "$CHANGELOG" \
            --arg rt "$RELEASE_TYPE" \
            --argjson gv "$GAME_VER_JSON" \
            '{ changelog: $cl, changelogType: "markdown", releaseType: $rt, gameVersions: $gv }')
          {
            echo 'METADATA<<__EOF__'
            echo "$METADATA"
            echo '__EOF__'
          } >> "$GITHUB_ENV"
          {
            echo ""
            echo "### Changelog (sent to CurseForge)"
            echo ""
            echo "$CHANGELOG"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 'Upload to CurseForge'
        id: cfupload
        if: steps.parse.outputs.skip != 'true' && steps.parse.outputs.release_type != 'test'
        run: |
          echo "::notice::POST $(basename $JAR_PATH) ($JAR_SIZE) as $RELEASE_TYPE ..."
          HTTP=$(curl --progress-bar \
            -o response.json -w "%{http_code}" \
            -H "X-Api-Token: $CF_TOKEN" \
            -F "metadata=$METADATA" \
            -F "file=@$JAR_PATH" \
            "https://minecraft.curseforge.com/api/projects/$CF_PROJECT_ID/upload-file")
          echo "::notice::upload HTTP $HTTP"
          echo "http_code=$HTTP" >> $GITHUB_OUTPUT
          if [ "$HTTP" != "200" ]; then
            echo "::error::CurseForge upload failed with HTTP $HTTP"
            cat response.json | head -40
            exit 1
          fi

      - name: 'Notify issue (upload failed)'
        if: failure() && steps.parse.outputs.skip != 'true' && steps.parse.outputs.release_type != 'test' && steps.cfupload.conclusion == 'failure'
        uses: actions/github-script@v9
        with:
          script: |
            const issueNum = parseInt(process.env.ISSUE_NUMBER, 10);
            const http = '${{ steps.cfupload.outputs.http_code }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: issueNum,
              body: `❌ CurseForge upload failed (HTTP ${http}). See run logs.`,
            });
            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: issueNum,
              labels: ['cf-upload-failed'],
            });
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: issueNum,
                name: 'cf-approval-pending',
              });
            } catch (e) { if (e.status !== 404) throw e; }

      - name: 'Verify CurseForge response & notify issue'
        if: success() && steps.parse.outputs.skip != 'true' && steps.parse.outputs.release_type != 'test'
        uses: actions/github-script@v9
        env:
          JAR_PATH: ${{ env.JAR_PATH }}
          JAR_SIZE: ${{ env.JAR_SIZE }}
          RELEASE_TYPE: ${{ env.RELEASE_TYPE }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const issueNum = parseInt(process.env.ISSUE_NUMBER, 10);
            const { JAR_PATH, JAR_SIZE, RELEASE_TYPE } = process.env;
            const jarName = path.basename(JAR_PATH);

            let fileId = '';
            try {
              const resp = JSON.parse(fs.readFileSync('response.json', 'utf8'));
              fileId = String(resp.id || '');
            } catch (e) { /* ignore */ }

            if (!fileId) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: issueNum,
                body: `⚠ Upload returned HTTP 200 but no file id — check CurseForge manually.`,
              });
              return;
            }

            const cfUrl = `https://www.curseforge.com/minecraft/mc-mods/arsenal-backpack/files/${fileId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: issueNum,
              body: `✅ Uploaded as **${RELEASE_TYPE}**: [\`${jarName}\` #${fileId}](${cfUrl})`,
            });
            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: issueNum,
              labels: ['cf-uploaded'],
            });
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: issueNum,
                name: 'cf-approval-pending',
              });
            } catch (e) { if (e.status !== 404) throw e; }

            await core.summary
              .addHeading('✅ Uploaded')
              .addList([
                `File: \`${jarName}\` (${JAR_SIZE})`,
                `Release type: \`${RELEASE_TYPE}\``,
                `CurseForge file: [#${fileId}](${cfUrl})`,
              ])
              .write();
            core.notice(`Uploaded as file #${fileId} → ${cfUrl}`);
